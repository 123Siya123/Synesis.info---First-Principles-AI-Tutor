name: Blog Automation

on:
  schedule:
    # Runs at 9:00 AM and 9:00 PM UTC every day (2 posts/day)
    - cron: '0 9,21 * * *'
  workflow_dispatch: # Allows manual trigger from the "Actions" tab

jobs:
  generate-blog-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Blog Post 1
        run: |
          echo "🚀 Triggering blog generation (Post 1 of 3)..."
          for attempt in 1 2; do
            response=$(curl -L -s -w "\n---HTTP_STATUS:%{http_code}---" \
              --max-time 180 \
              "https://www.synesis.info/api/cron/blog")
            echo "Attempt $attempt response:"
            echo "$response"
            echo ""
            http_status=$(echo "$response" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
            # If the queue was empty the API will have refilled it instead of
            # publishing. Retry once so we still ship a post this slot.
            if echo "$response" | grep -q '"refilled":true'; then
              echo "♻️  Queue refilled with new topics — retrying to publish a post"
              sleep 10
              continue
            fi
            if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
              echo "✅ Post 1 generated successfully"
            else
              echo "⚠️ Post 1 returned status $http_status"
            fi
            break
          done
          sleep 15

      - name: Generate Blog Post 2
        run: |
          echo "🚀 Triggering blog generation (Post 2 of 3)..."
          for attempt in 1 2; do
            response=$(curl -L -s -w "\n---HTTP_STATUS:%{http_code}---" \
              --max-time 180 \
              "https://www.synesis.info/api/cron/blog")
            echo "Attempt $attempt response:"
            echo "$response"
            echo ""
            http_status=$(echo "$response" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
            if echo "$response" | grep -q '"refilled":true'; then
              echo "♻️  Queue refilled with new topics — retrying to publish a post"
              sleep 10
              continue
            fi
            if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
              echo "✅ Post 2 generated successfully"
            else
              echo "⚠️ Post 2 returned status $http_status"
            fi
            break
          done
          sleep 15

      - name: Generate Blog Post 3
        run: |
          echo "🚀 Triggering blog generation (Post 3 of 3)..."
          for attempt in 1 2; do
            response=$(curl -L -s -w "\n---HTTP_STATUS:%{http_code}---" \
              --max-time 180 \
              "https://www.synesis.info/api/cron/blog")
            echo "Attempt $attempt response:"
            echo "$response"
            echo ""
            http_status=$(echo "$response" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
            if echo "$response" | grep -q '"refilled":true'; then
              echo "♻️  Queue refilled with new topics — retrying to publish a post"
              sleep 10
              continue
            fi
            if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
              echo "✅ Post 3 generated successfully"
            else
              echo "⚠️ Post 3 returned status $http_status"
            fi
            break
          done

      - name: Summary
        run: |
          echo "=========================================="
          echo "🎉 Blog automation batch complete!"
          echo "Check https://www.synesis.info/blog for new posts"
          echo "=========================================="
