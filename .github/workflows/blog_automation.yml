name: Blog Automation

on:
  schedule:
    # Runs at 9:00 AM and 9:00 PM UTC every day (2 posts/day)
    - cron: '0 9,21 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the "Actions" tab

jobs:
  trigger-blog-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Blog API endpoint (Batch of 3)
        run: |
          echo "Triggering blog generation batch..."
          
          for i in {1..3}
          do
             echo "--- Attempt $i ---"
             response=$(curl -L -s -w "\nHTTP_STATUS:%{http_code}" --max-time 300 https://www.synesis.info/api/cron/blog)
             echo "Response Body:"
             echo "$response"
             
             # Wait 10 seconds between posts to avoid rate limits
             sleep 10
          done
          
          echo "Batch complete."
