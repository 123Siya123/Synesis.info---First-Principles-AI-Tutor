name: Blog Automation

on:
  schedule:
    # Runs at 9:00 AM and 9:00 PM UTC every day (2 posts/day)
    - cron: '0 9,21 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the "Actions" tab

jobs:
  trigger-blog-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Blog API endpoint
        run: |
          echo "Triggering blog generation..."
          # -v: verbose (see headers)
          # -f: fail on HTTP errors (4xx, 5xx)
          # --show-error: show error message if it fails
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" https://synesis.info/api/cron/blog)
          
          echo "Response Body:"
          echo "$response"
          
          # Extract status code
          http_status=$(echo "$response" | tail -n1 | cut -d':' -f2)
          
          if [ "$http_status" -ne 200 ]; then
            echo "Error: API returned status $http_status"
            exit 1
          fi
          
          echo "Success!"
