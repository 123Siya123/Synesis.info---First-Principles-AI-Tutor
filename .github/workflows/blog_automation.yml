name: Blog Automation

on:
  schedule:
    # Runs at 9:00 AM and 9:00 PM UTC every day (2 posts/day)
    - cron: '0 9,21 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the "Actions" tab

jobs:
  trigger-blog-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Blog API endpoint
        run: |
          echo "Triggering blog generation..."
          # -L: Follow redirects (Fixes 301 error)
          # -s: Silent (no progress bar)
          # -w: Write status code at end
          # --max-time 300: Wait up to 5 mins for AI generation
          response=$(curl -L -s -w "\nHTTP_STATUS:%{http_code}" --max-time 300 https://www.synesis.info/api/cron/blog)
          
          echo "Response Body:"
          echo "$response"
          
          # Extract status code (last line)
          http_status=$(echo "$response" | tail -n1 | cut -d':' -f2)
          
          if [ "$http_status" -ne 200 ]; then
            echo "Error: API returned status $http_status"
            exit 1
          fi
          
          echo "Success! Blog post generated."
